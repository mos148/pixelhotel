services:
  db:
    image: postgres:16
    container_name: pixelhotel-postgres
    restart: unless-stopped
    env_file: .env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pixelhotel_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pixelhotel_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pixelhotel-backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
    networks:
      - pixelhotel_network

networks:
  pixelhotel_network:
    driver: bridge

volumes:
  pixelhotel_pgdata: